services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: iapex
      POSTGRES_PASSWORD: iapex
      POSTGRES_DB: iapex
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iapex -d iapex"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://iapex:iapex@db:5432/iapex
      PORT: "3100"
      SERVE_UI: "true"
      IAPEX_DEPLOYMENT_MODE: "authenticated"
      IAPEX_DEPLOYMENT_EXPOSURE: "private"
      IAPEX_PUBLIC_URL: "${IAPEX_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - iapex-data:/iapex
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  iapex-data:
